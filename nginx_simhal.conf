# =================================================================
# 🌐 Configuração Nginx: SimHal Agendamento (SaaS)
# =================================================================

# 1. Redirecionamento HTTP para HTTPS (Opcional)
server {
    listen 80;
    server_name agenda.seusistema.com; # <--- Coloque seu domínio aqui
    return 301 https://$host$request_uri;
}

# 2. Servidor Principal
server {
    listen 443 ssl;
    server_name agenda.seusistema.com; # <--- Coloque seu domínio aqui

    # SSL (Caminhos do Certbot)
    # ssl_certificate /etc/letsencrypt/live/agenda.seusistema.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agenda.seusistema.com/privkey.pem;

    # --- FRONTEND (React Build) ---
    location / {
        root /opt/simhal/interface/dist; # <--- Pasta do build do frontend
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (Node.js API) ---
    location /api {
        proxy_pass http://localhost:3005; # <--- Porta do SimHal (Isolada do Financeiro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- WHATSAPP (Websockets/Evolution API) ---
    location /whatsapp {
        proxy_pass http://localhost:8080; # <--- Porta da Evolution API
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
